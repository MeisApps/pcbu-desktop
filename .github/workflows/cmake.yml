name: CMake
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: vcpkg build arm64
        uses: johnwason/vcpkg-action@v6
        with:
          pkgs: openssl
          triplet: arm64-windows-static
          token: ${{ github.token }}
          github-binarycache: true
          cache-key: 'vcpkg-arm64'

      - name: Install Qt arm64
        uses: jurplel/install-qt-action@v4
        with:
          dir: 'C:/'
          version: '6.9.1'
          host: 'windows_arm64'
          target: 'desktop'
          arch: 'win64_msvc2022_arm64'
          cache: 'true'
          cache-key-prefix: 'qt-arm64'

      - name: Install Qt x64
        uses: jurplel/install-qt-action@v4
        with:
          dir: 'C:/'
          version: '6.9.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: 'true'
          cache-key-prefix: 'qt-x64'

      - name: Build arm64
        run: bash -c "cd pkg && chmod +x build-desktop.sh && ARCH=arm64 QT_BASE_DIR=C:/Qt/6.9.1 ./build-desktop.sh"
        env:
          VCPKG_ROOT: ${{github.workspace}}/vcpkg

      - name: Upload arm64
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkg/build/PCBioUnlock-Setup-arm64.exe
